button_card_templates:
  room_tile:
    show_state: false
    show_label: true
    size: 40%
    tap_action:
      action: navigate
      navigation_path: "[[[return variables.popup_hash]]]"
    label: |
      [[[
        var parts = [];
        if (variables.presence_entity && states[variables.presence_entity] && states[variables.presence_entity].state === 'on') {
          parts.push('Occupied');
        }
        if (variables.light_entity && states[variables.light_entity] && states[variables.light_entity].state === 'on') {
          var bri = states[variables.light_entity].attributes.brightness;
          parts.push(bri ? 'Lights ' + Math.round(bri / 255 * 100) + '%' : 'Lights on');
        }
        return parts.length ? parts.join('  ·  ') : '\u00a0';
      ]]]
    custom_fields:
      temp: |
        [[[
          if (!variables.temp_entity || !states[variables.temp_entity]) return '';
          var t = Math.round(parseFloat(states[variables.temp_entity].state));
          return '<span style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1">' + t + '°</span>';
        ]]]
    styles:
      card:
        - background-color: |
            [[[
              if (variables.light_entity && states[variables.light_entity] && states[variables.light_entity].state === 'on') {
                return 'rgba(40, 42, 52, 0.97)';
              }
              return 'rgba(22, 24, 30, 0.92)';
            ]]]
        - border-radius: 20px
        - border: 1px solid rgba(255,255,255,0.06)
        - box-shadow: none
        - padding: 20px
        - cursor: pointer
        - transition: background-color 0.3s
      name:
        - font-size: 13px
        - font-weight: 600
        - letter-spacing: 0.04em
        - text-transform: uppercase
        - color: rgba(255,255,255,0.85)
        - justify-self: start
        - margin-top: 12px
      label:
        - font-size: 11px
        - color: rgba(255,255,255,0.4)
        - justify-self: start
        - margin-top: 3px
      icon:
        - color: |
            [[[
              if (variables.light_entity && states[variables.light_entity] && states[variables.light_entity].state === 'on') {
                return '#f0a535';
              }
              return 'rgba(255,255,255,0.25)';
            ]]]
        - width: 32px
        - height: 32px
      img_cell:
        - justify-content: start
        - align-self: start
      grid:
        - grid-template-areas: '"i temp" "n n" "l l"'
        - grid-template-columns: 1fr auto
        - grid-template-rows: auto auto auto
      custom_fields:
        temp:
          - display: flex
          - align-items: flex-start
          - justify-content: flex-end
          - padding-top: 2px

