  - title: Home
    path: home
    icon: mdi:home
    cards:

      # Room tile grid
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: repeat(3, 1fr)
          grid-column-gap: 12px
          grid-row-gap: 12px
          padding: 16px
          mediaquery:
            "(max-width: 768px)":
              grid-template-columns: repeat(2, 1fr)
        cards:

          # ── Header chips ─────────────────────────────────────
          - view_layout:
              grid-column: 1 / -1
            type: custom:mushroom-chips-card
