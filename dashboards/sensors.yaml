        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.office_sensor_2_humidity
            name: Office (Aqara)
            icon: mdi:water-percent
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.living_room_sensor_2_humidity
            name: Living Room (Aqara)
            icon: mdi:water-percent
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.bedroom_sensor_2_humidity
            name: Bedroom (Aqara)
            icon: mdi:water-percent
            layout: vertical

      # Humidity history graph
      - type: history-graph
        title: Humidity (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.office_sensor_humidity
            name: Office (FP300)
          - entity: sensor.office_sensor_2_humidity
            name: Office (Aqara)
          - entity: sensor.living_room_sensor_humidity
            name: Living Room (FP300)
          - entity: sensor.living_room_sensor_2_humidity
            name: Living Room (Aqara)
          - entity: sensor.bedroom_sensor_humidity
            name: Bedroom (FP300)
          - entity: sensor.bedroom_sensor_2_humidity
            name: Bedroom (Aqara)
          - entity: sensor.hallway_sensor_humidity
            name: Hallway
          - entity: sensor.guest_room_sensor_humidity
            name: Guest Room
          - entity: sensor.kitchen_sensor_humidity
            name: Kitchen

      # Illuminance
      - type: custom:mushroom-title-card
        title: Light Level
        subtitle: Illuminance (lux)

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.office_sensor_illuminance
            name: Office
            icon: mdi:brightness-6
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.living_room_sensor_illuminance
            name: Living Room
            icon: mdi:brightness-6
