title: Sensors
views:
  # ── VIEW 1: OVERVIEW ──────────────────────────────────────────
  - title: Overview
    path: overview
    icon: mdi:eye
    cards:
      # Presence at a glance — all rooms in one row
      - type: custom:mushroom-title-card
        title: Presence
        subtitle: Room presence detection

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: binary_sensor.office_sensor_presence
            name: Office
            icon: mdi:desk
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: binary_sensor.living_room_sensor_presence
            name: Living Room
            icon: mdi:sofa
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: binary_sensor.bedroom_sensor_presence
            name: Bedroom
            icon: mdi:bed
            layout: vertical
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: binary_sensor.hallway_sensor_presence
            name: Hallway
            icon: mdi:door-open
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: binary_sensor.guest_room_sensor_presence
            name: Guest Room
            icon: mdi:bed-outline
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: binary_sensor.kitchen_sensor_presence
            name: Kitchen
            icon: mdi:stove
            layout: vertical

      # Target distance
      - type: custom:mushroom-title-card
        title: Target Distance
        subtitle: Distance to detected person (m)

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.office_sensor_target_distance
            name: Office
            icon: mdi:signal-distance-variant
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.living_room_sensor_target_distance
            name: Living Room
            icon: mdi:signal-distance-variant
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.bedroom_sensor_target_distance
            name: Bedroom
            icon: mdi:signal-distance-variant
            layout: vertical
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.hallway_sensor_target_distance
            name: Hallway
            icon: mdi:signal-distance-variant
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.guest_room_sensor_target_distance
            name: Guest Room
            icon: mdi:signal-distance-variant
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.kitchen_sensor_target_distance
            name: Kitchen
            icon: mdi:signal-distance-variant
            layout: vertical

      # Temperature comparison
      - type: custom:mushroom-title-card
        title: Temperature
        subtitle: Across rooms

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.office_sensor_temperature
            name: Office
            icon: mdi:thermometer
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.living_room_sensor_temperature
            name: Living Room
            icon: mdi:thermometer
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.bedroom_sensor_temperature
            name: Bedroom
            icon: mdi:thermometer
            layout: vertical
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.hallway_sensor_temperature
            name: Hallway
            icon: mdi:thermometer
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.guest_room_sensor_temperature
            name: Guest Room
            icon: mdi:thermometer
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.kitchen_sensor_temperature
            name: Kitchen
            icon: mdi:thermometer
            layout: vertical

      # Aqara temp/humidity sensors (WSDCGQ11LM)
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.office_sensor_2_temperature
            name: Office (Aqara)
            icon: mdi:thermometer
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.living_room_sensor_2_temperature
            name: Living Room (Aqara)
            icon: mdi:thermometer
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.bedroom_sensor_2_temperature
            name: Bedroom (Aqara)
            icon: mdi:thermometer
            layout: vertical

      # Temperature history graph
      - type: history-graph
        title: Temperature (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.office_sensor_temperature
            name: Office (FP300)
          - entity: sensor.office_sensor_2_temperature
            name: Office (Aqara)
          - entity: sensor.living_room_sensor_temperature
            name: Living Room (FP300)
          - entity: sensor.living_room_sensor_2_temperature
            name: Living Room (Aqara)
          - entity: sensor.bedroom_sensor_temperature
            name: Bedroom (FP300)
          - entity: sensor.bedroom_sensor_2_temperature
            name: Bedroom (Aqara)
          - entity: sensor.hallway_sensor_temperature
            name: Hallway
          - entity: sensor.guest_room_sensor_temperature
            name: Guest Room
          - entity: sensor.kitchen_sensor_temperature
            name: Kitchen

      # Humidity comparison
      - type: custom:mushroom-title-card
        title: Humidity
        subtitle: Across rooms

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.office_sensor_humidity
            name: Office
            icon: mdi:water-percent
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.living_room_sensor_humidity
            name: Living Room
            icon: mdi:water-percent
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.bedroom_sensor_humidity
            name: Bedroom
            icon: mdi:water-percent
            layout: vertical
