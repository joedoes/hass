            name: Office
          - entity: sensor.living_room_sensor_illuminance
            name: Living Room
          - entity: sensor.bedroom_sensor_illuminance
            name: Bedroom
          - entity: sensor.hallway_sensor_illuminance
            name: Hallway
          - entity: sensor.guest_room_sensor_illuminance
            name: Guest Room
          - entity: sensor.kitchen_sensor_illuminance
            name: Kitchen

      # Pressure (Aqara WSDCGQ11LM only)
