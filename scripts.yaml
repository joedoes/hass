bedtime_sequence:
  alias: Bedtime Sequence
  icon: mdi:weather-night
  mode: single
  sequence:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.bedtime_active
  - variables:
      weather_condition: '{{ states(''weather.forecast_home'') }}'
      temp: '{{ state_attr(''weather.forecast_home'', ''temperature'') | float(20)
        }}'
      is_heavy_rain: '{{ weather_condition in [''pouring'', ''lightning-rainy'', ''lightning'',
        ''hail''] }}'
      is_rain: '{{ weather_condition in [''rainy'', ''pouring'', ''lightning-rainy'',
        ''lightning'', ''hail''] }}'
      is_cloudy: '{{ weather_condition in [''cloudy'', ''fog''] }}'
      is_partly_cloudy: '{{ weather_condition == ''partlycloudy'' }}'
      is_clear: '{{ weather_condition in [''sunny'', ''clear-night'', ''clear''] }}'
      is_very_warm: '{{ temp > 28 }}'
      weather_xy_x: '{% if is_heavy_rain %}0.1400 {% elif is_rain %}0.1535 {% elif
        is_cloudy %}0.2700 {% elif is_very_warm and is_clear %}0.5900 {% elif is_clear
        or is_partly_cloudy %}0.5268 {% else %}0.3500{% endif %}

        '
      weather_xy_y: '{% if is_heavy_rain %}0.0500 {% elif is_rain %}0.0596 {% elif
        is_cloudy %}0.1800 {% elif is_very_warm and is_clear %}0.3800 {% elif is_clear
        or is_partly_cloudy %}0.4133 {% else %}0.3000{% endif %}

        '
      weather_hs_h: '{% if is_heavy_rain %}265 {% elif is_rain %}260 {% elif is_cloudy
        %}250 {% elif is_very_warm and is_clear %}20 {% elif is_clear %}30 {% elif
        is_partly_cloudy %}40 {% else %}45{% endif %}

        '
      weather_hs_s: '{% if is_heavy_rain %}98 {% elif is_rain %}95 {% elif is_cloudy
        %}70 {% elif is_very_warm and is_clear %}100 {% elif is_clear %}90 {% elif
        is_partly_cloudy %}75 {% else %}60{% endif %}

        '
  - service: cover.close_cover
    target:
      entity_id:
      - cover.living_room_shade
      - cover.office_shade
      - cover.dinning_room_shade
  - if:
    - condition: template
      value_template: '{{ states("media_player.living_room_apple_tv") not in ["off",
        "unavailable", "unknown"] }}

        '
    then:
    - service: media_player.turn_off
      target:
        entity_id: media_player.living_room_apple_tv
  - service: light.turn_on
    target:
      entity_id:
      - light.underbed_1
      - light.underbed_2
    data:
      brightness_pct: 80
      hs_color:
      - '{{ weather_hs_h | float }}'
      - '{{ weather_hs_s | float }}'
      transition: 1
  - service: light.turn_on
    target:
      entity_id: light.office
    data:
      brightness_pct: 1
      transition: 120
  - service: light.turn_on
    target:
      entity_id: light.desk_lamp
    data:
      brightness_pct: 2
      xy_color:
      - 0.6725
      - 0.323
      transition: 120
  - service: light.turn_on
    target:
      entity_id: light.living_room
    data:
      brightness_pct: 2
      xy_color:
      - 0.6725
      - 0.323
      transition: 180
  - service: light.turn_on
    target:
      entity_id: light.dinning_room_plant_light
    data:
      brightness_pct: 5
      xy_color:
      - 0.6725
      - 0.323
      transition: 180
  - service: light.turn_on
    target:
      entity_id: light.guest_room_back_lamp
    data:
      brightness_pct: 2
      xy_color:
      - 0.6725
      - 0.323
      transition: 180
  - service: light.turn_on
    target:
      entity_id: light.bedroom
    data:
      brightness_pct: 5
      xy_color:
      - '{{ weather_xy_x | float }}'
      - '{{ weather_xy_y | float }}'
      transition: 300
  - service: light.turn_on
    target:
      entity_id:
      - light.hallway_spot_1
      - light.hallway_spot_2
      - light.hallway_spot_4_2
      - light.hallway_spot_4
    data:
      brightness_pct: 10
      xy_color:
      - '{{ weather_xy_x | float }}'
      - '{{ weather_xy_y | float }}'
      transition: 2
  - service: light.turn_on
    target:
      entity_id:
      - light.master_bedside_lamp_1
      - light.master_bedside_lamp_2
    data:
      brightness_pct: 30
      xy_color:
      - 0.58
      - 0.38
      transition: 120
  - delay:
      seconds: 2
  - service: light.turn_on
    target:
      entity_id:
      - light.underbed_1
      - light.underbed_2
    data:
      brightness_pct: 35
      transition: 300
  - delay:
      seconds: 118
  - service: light.turn_off
    target:
      entity_id: light.office
  - service: light.turn_on
    target:
      entity_id:
      - light.master_bedside_lamp_1
      - light.master_bedside_lamp_2
    data:
      brightness_pct: 1
      xy_color:
      - 0.58
      - 0.38
      transition: 480
  - delay:
      seconds: 60
  - service: light.turn_on
    target:
      entity_id: light.hallway_spot_1
    data:
      brightness_pct: 1
      transition: 120
  - delay:
      seconds: 15
  - service: light.turn_on
    target:
      entity_id: light.hallway_spot_2
    data:
      brightness_pct: 1
      transition: 120
  - delay:
      seconds: 15
  - service: light.turn_on
    target:
      entity_id: light.hallway_spot_4
    data:
      brightness_pct: 1
      transition: 120
  - delay:
      seconds: 15
  - service: light.turn_on
    target:
      entity_id: light.hallway_spot_4_2
    data:
      brightness_pct: 1
      transition: 120
  - delay:
      seconds: 77
  - service: light.turn_on
    target:
      entity_id:
      - light.underbed_1
      - light.underbed_2
    data:
      brightness_pct: 15
      hs_color:
      - 30
      - 90
      transition: 60
  - delay:
      seconds: 43
  - delay:
      seconds: 17
  - service: light.turn_off
    target:
      entity_id:
      - light.underbed_1
      - light.underbed_2
    data:
      transition: 600
  - delay:
      seconds: 163
  - service: light.turn_off
    target:
      entity_id:
      - light.hallway_spot_1
      - light.hallway_spot_2
      - light.hallway_spot_4_2
      - light.hallway_spot_4
  - delay:
      seconds: 135
  - service: light.turn_off
    target:
      entity_id:
      - light.master_bedside_lamp_1
      - light.master_bedside_lamp_2
